spring.application.name=vgashop

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/vga_store?useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=postgres
spring.datasource.password=3007

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.connection.characterEncoding=UTF-8
spring.jpa.properties.hibernate.connection.useUnicode=true

# File upload
app.upload.dir=uploads/products
spring.mvc.static-path-pattern=/uploads/**

# JWT
app.jwt.secret=VGAStore2024SecretKeyForJWTTokenGenerationMustBe256BitsLong!
app.jwt.expiration=86400000
jwt.secret=vga-shop-secret-key-2026-very-strong-and-long-enough-for-hmac

# Spring Security in-memory user (admin panel fallback)
spring.security.user.name=admin
spring.security.user.password=admin123
spring.security.user.roles=ADMIN

# CORS
app.cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://localhost:5175

# Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# URL — update when deploying to production
app.frontend.url=http://localhost:5173
app.backend.url=http://localhost:8080

