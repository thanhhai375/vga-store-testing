name: API Testing CI

on:
  push:
    branches: [ master, develop, KCPM-12 ]

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write 
    # ------------------
    steps:
      - uses: actions/checkout@v4 # Đã nâng lên v4
      - name: Start Backend Server
        run: |
          docker-compose up -d
          sleep 15 # Dừng 15s để chờ server bật lên hẳn ở cổng 8080

      - name: Install Node.js
        uses: actions/setup-node@v4 # Đã nâng lên v4
        with:
          node-version: '18'

      - name: Install Newman
        run: npm install -g newman

      - name: Run API Tests
        run: |
          # Chạy tất cả file trong thư mục
          newman run postman-tests/payment.json -e postman-tests/payment_environment.json --reporters cli,junit --reporter-junit-export junit-report.xml
        
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v4 # Đã nâng lên v4
        if: always()
        with:
          report_paths: 'junit-report.xml'

